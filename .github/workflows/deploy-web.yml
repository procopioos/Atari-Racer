name: Deploy Web Build

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'site/**'
      - '.github/workflows/deploy-web.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install pygbag
        run: pip install pygbag
      - name: Build web version
        run: pygbag --build atari.py
      - name: Assemble site
        run: |
          mkdir -p dist
          cp -r site/. dist/
          mkdir -p dist/game
          cp -r build/web/. dist/game/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
